name: g2ui-prod

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: g2ui-api:prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL connection string}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${API_PORT:-8000}:8000"
    command:
      - sh
      - -c
      - >-
        alembic upgrade head &&
        exec uvicorn g2ui_api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
