name: guimintlab-studio

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: guimintlab-api:dev
    container_name: guimintlab-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api/src:/app/src:ro
      - ../apps/api/alembic:/app/alembic:ro
    command: >
      uvicorn guimintlab_api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: node:20-alpine
    container_name: guimintlab-web
    profiles: ["full"]
    working_dir: /app
    command: >
      sh -c "
        npm install -g pnpm@9.15.0 &&
        pnpm install --frozen-lockfile &&
        pnpm --filter web dev --host 0.0.0.0
      "
    ports:
      - "5173:5173"
    volumes:
      - ../:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    env_file:
      - ../.env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
